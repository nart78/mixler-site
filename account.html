<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Account | Mixler</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js"></script>
</head>
<body>
  <div id="site-nav"></div>

  <section class="account-section">
    <div class="container">
      <h1>My Account</h1>
      <div class="account-grid">
        <!-- Profile -->
        <div class="account-card">
          <h3>Profile</h3>
          <div id="profile-content">
            <div class="loading-spinner"><div class="spinner"></div></div>
          </div>
        </div>

        <!-- Upcoming Events -->
        <div class="account-card">
          <h3>My Upcoming Events</h3>
          <div id="upcoming-tickets">
            <div class="loading-spinner"><div class="spinner"></div></div>
          </div>
        </div>

        <!-- Order History -->
        <div class="account-card full-width">
          <h3>Order History</h3>
          <div id="order-history">
            <div class="loading-spinner"><div class="spinner"></div></div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <div id="site-footer"></div>

  <script type="module">
    import { renderNav, renderFooter, showToast } from './js/components.js';
    import { requireAuth, getCurrentUser } from './js/auth.js';
    import { db } from './js/supabase-client.js';
    import { formatDate, formatTime, formatPrice } from './js/utils.js';
    import { generateTicketPDF } from './js/ticket-pdf.js';

    renderNav('account');
    renderFooter();

    const session = await requireAuth();
    if (!session) throw new Error('Not authenticated');

    const user = await getCurrentUser();

    // Load profile
    const profileEl = document.getElementById('profile-content');
    const isAdmin = user.profile?.is_admin === true;
    profileEl.innerHTML = `
      ${isAdmin ? '<a href="/admin/" class="btn btn-pink" style="width:100%;margin-bottom:20px;justify-content:center;">Admin Dashboard</a>' : ''}
      <div class="profile-info">
        <div class="profile-row"><strong>Name</strong><span>${user.profile?.full_name || 'Not set'}</span></div>
        <div class="profile-row"><strong>Email</strong><span>${user.email}</span></div>
        <div class="profile-row"><strong>Phone</strong><span>${user.profile?.phone || 'Not set'}</span></div>
      </div>
    `;

    // Load orders with event details
    const { data: orders } = await db
      .from('orders')
      .select('*, events(title, slug, event_date, start_time, end_time, location_name, location_address)')
      .eq('user_id', user.id)
      .order('created_at', { ascending: false });

    // Upcoming tickets
    const upcomingEl = document.getElementById('upcoming-tickets');
    const today = new Date().toISOString().split('T')[0];
    const upcoming = (orders || []).filter(o =>
      o.payment_status === 'completed' && o.events && o.events.event_date >= today
    );

    if (upcoming.length === 0) {
      upcomingEl.innerHTML = '<p class="empty-state">No upcoming events. <a href="/events.html">Browse events</a></p>';
    } else {
      upcomingEl.innerHTML = upcoming.map(o => `
        <div class="upcoming-ticket-card">
          <a href="/event.html?slug=${o.events.slug}" class="upcoming-ticket">
            <div>
              <strong>${o.events.title}</strong>
              <span>${formatDate(o.events.event_date)} at ${formatTime(o.events.start_time)}</span>
            </div>
            <span class="ticket-qty">${o.quantity} ticket${o.quantity > 1 ? 's' : ''}</span>
          </a>
          <div class="ticket-actions">
            <button class="btn btn-outline btn-sm download-tickets-btn" data-order-id="${o.id}" data-order-number="${o.order_number}">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="7 10 12 15 17 10"/>
                <line x1="12" y1="15" x2="12" y2="3"/>
              </svg>
              Download Tickets
            </button>
            <a href="/order-confirmation.html?order=${o.order_number}" class="btn btn-outline btn-sm">View Order</a>
          </div>
        </div>
      `).join('');

      // Download ticket handlers
      document.querySelectorAll('.download-tickets-btn').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          e.preventDefault();
          const orderId = btn.dataset.orderId;
          const orderNum = btn.dataset.orderNumber;
          btn.disabled = true;
          btn.textContent = 'Generating...';

          try {
            const order = upcoming.find(o => o.id === orderId);
            const { data: attendees } = await db
              .from('attendees')
              .select('*, ticket_types(name)')
              .eq('order_id', orderId);

            if (order && attendees) {
              generateTicketPDF(order.events, order, attendees);
            }
          } catch (err) {
            console.error('PDF generation failed:', err);
            showToast('Failed to generate PDF. Please try again.', 'error');
          }

          btn.disabled = false;
          btn.innerHTML = `
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            Download Tickets`;
        });
      });
    }

    // Order history
    const historyEl = document.getElementById('order-history');
    if (!orders || orders.length === 0) {
      historyEl.innerHTML = '<p class="empty-state">No orders yet.</p>';
    } else {
      historyEl.innerHTML = `
        <table class="orders-table">
          <thead>
            <tr>
              <th>Order</th>
              <th>Event</th>
              <th>Date</th>
              <th>Qty</th>
              <th>Total</th>
              <th>Status</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            ${orders.map(o => `
              <tr>
                <td>${o.order_number}</td>
                <td>${o.events?.title || 'Unknown'}</td>
                <td>${new Date(o.created_at).toLocaleDateString()}</td>
                <td>${o.quantity}</td>
                <td>${formatPrice(o.total_cents)}</td>
                <td><span class="status-badge status-${o.payment_status}">${o.payment_status}</span></td>
                <td>${o.payment_status === 'completed' ? `<button class="btn-link history-download-btn" data-order-id="${o.id}" data-order-number="${o.order_number}">Tickets</button>` : ''}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;

      // History download handlers
      document.querySelectorAll('.history-download-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          const orderId = btn.dataset.orderId;
          btn.textContent = '...';
          btn.disabled = true;

          try {
            const order = orders.find(o => o.id === orderId);
            const { data: attendees } = await db
              .from('attendees')
              .select('*, ticket_types(name)')
              .eq('order_id', orderId);

            if (order && attendees) {
              generateTicketPDF(order.events, order, attendees);
            }
          } catch (err) {
            console.error('PDF generation failed:', err);
          }

          btn.textContent = 'Tickets';
          btn.disabled = false;
        });
      });
    }
  </script>
</body>
</html>
