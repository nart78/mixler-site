<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | Mixler</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/admin.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body class="admin-body">
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <a href="/" class="nav-logo" style="padding:24px;"><img src="/images/mixler-white-wide.png" alt="Mixler" class="nav-logo-img"></a>
      <nav class="admin-nav">
        <a href="/admin/" class="admin-nav-link active">Dashboard</a>
        <a href="/admin/events.html" class="admin-nav-link">Events</a>
        <a href="/admin/orders.html" class="admin-nav-link">Orders</a>
        <a href="/admin/coupons.html" class="admin-nav-link">Coupons</a>
        <a href="/admin/attendees.html" class="admin-nav-link">Attendees</a>
        <a href="/admin/customers.html" class="admin-nav-link">Customers</a>
        <a href="/admin/messages.html" class="admin-nav-link">Messages</a>
        <a href="/admin/scan.html" class="admin-nav-link">Scan</a>
      </nav>
      <div class="admin-sidebar-footer">
        <a href="/" class="admin-nav-link">Back to Site</a>
        <a href="#" id="admin-logout" class="admin-nav-link">Log Out</a>
      </div>
    </aside>

    <main class="admin-main">
      <div class="admin-header">
        <h1>Dashboard</h1>
      </div>

      <!-- Stats Cards -->
      <div class="admin-stats" id="stats-grid">
        <div class="stat-card">
          <div class="stat-card-label">Total Revenue</div>
          <div class="stat-card-value" id="stat-revenue">$0.00</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">This Month</div>
          <div class="stat-card-value" id="stat-month-revenue">$0.00</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">Tickets Sold</div>
          <div class="stat-card-value" id="stat-tickets">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">Active Events</div>
          <div class="stat-card-value" id="stat-events">0</div>
        </div>
      </div>

      <!-- Revenue Chart -->
      <div class="admin-card">
        <h3>Revenue (Last 30 Days)</h3>
        <div style="height:280px;position:relative;">
          <canvas id="revenue-chart"></canvas>
        </div>
      </div>

      <!-- Two Column: Upcoming Events + Recent Orders -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;">
        <div class="admin-card">
          <h3>Upcoming Events</h3>
          <div id="upcoming-events-list">
            <div class="loading-spinner"><div class="spinner"></div></div>
          </div>
        </div>

        <div class="admin-card">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
            <h3 style="margin-bottom:0;">Recent Orders</h3>
            <a href="/admin/orders.html" class="btn-sm">View All</a>
          </div>
          <div id="recent-orders">
            <div class="loading-spinner"><div class="spinner"></div></div>
          </div>
        </div>
      </div>

      <!-- Activity Feed -->
      <div class="admin-card">
        <h3>Recent Activity</h3>
        <div id="activity-feed">
          <div class="loading-spinner"><div class="spinner"></div></div>
        </div>
      </div>
    </main>
  </div>

  <script type="module">
    import { requireAdmin, signOut } from '../js/auth.js';
    import { db } from '../js/supabase-client.js';
    import { formatPrice, formatDate, formatTime } from '../js/utils.js';

    await requireAdmin();

    document.getElementById('admin-logout').addEventListener('click', async (e) => {
      e.preventDefault();
      await signOut();
    });

    async function loadDashboard() {
      // All completed orders
      const { data: orders } = await db
        .from('orders')
        .select('total_cents, quantity, created_at, payment_status, buyer_name, buyer_email, order_number, events(title)')
        .order('created_at', { ascending: false });

      const completed = (orders || []).filter(o => o.payment_status === 'completed');
      const totalRevenue = completed.reduce((sum, o) => sum + o.total_cents, 0);
      const totalTickets = completed.reduce((sum, o) => sum + o.quantity, 0);

      const monthStart = new Date();
      monthStart.setDate(1);
      monthStart.setHours(0, 0, 0, 0);
      const monthRevenue = completed
        .filter(o => new Date(o.created_at) >= monthStart)
        .reduce((sum, o) => sum + o.total_cents, 0);

      document.getElementById('stat-revenue').textContent = formatPrice(totalRevenue);
      document.getElementById('stat-month-revenue').textContent = formatPrice(monthRevenue);
      document.getElementById('stat-tickets').textContent = totalTickets;

      // Revenue chart - last 30 days
      const now = new Date();
      const labels = [];
      const data = [];
      for (let i = 29; i >= 0; i--) {
        const date = new Date(now);
        date.setDate(date.getDate() - i);
        const dateStr = date.toISOString().split('T')[0];
        labels.push(date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }));
        const dayRevenue = completed
          .filter(o => o.created_at.startsWith(dateStr))
          .reduce((sum, o) => sum + o.total_cents, 0);
        data.push(dayRevenue / 100);
      }

      new Chart(document.getElementById('revenue-chart'), {
        type: 'bar',
        data: {
          labels,
          datasets: [{
            label: 'Revenue ($)',
            data,
            backgroundColor: 'rgba(21, 61, 182, 0.7)',
            borderRadius: 4,
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
          },
          scales: {
            x: {
              grid: { display: false },
              ticks: { maxTicksLimit: 10, font: { size: 11 } },
            },
            y: {
              beginAtZero: true,
              ticks: {
                callback: v => '$' + v,
                font: { size: 11 },
              },
            },
          },
        },
      });

      // Active events
      const { data: events } = await db
        .from('events')
        .select('*')
        .eq('status', 'published')
        .gte('event_date', new Date().toISOString().split('T')[0])
        .order('event_date', { ascending: true });

      document.getElementById('stat-events').textContent = (events || []).length;

      // Render upcoming events
      const eventsEl = document.getElementById('upcoming-events-list');
      if (!events || events.length === 0) {
        eventsEl.innerHTML = '<p class="empty-state">No upcoming events.</p>';
      } else {
        eventsEl.innerHTML = `
          <table class="admin-table">
            <thead><tr><th>Event</th><th>Date</th><th>Sold</th><th>Cap</th></tr></thead>
            <tbody>
              ${events.slice(0, 5).map(e => `
                <tr>
                  <td><a href="/admin/event-edit.html?id=${e.id}">${e.title}</a></td>
                  <td>${formatDate(e.event_date).split(',').slice(0, 2).join(',')}</td>
                  <td>${e.tickets_sold}</td>
                  <td>${e.capacity}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
          ${events.length > 5 ? `<a href="/admin/events.html" style="display:block;text-align:center;margin-top:12px;font-size:0.85rem;">View all ${events.length} events</a>` : ''}
        `;
      }

      // Recent orders
      const recentOrders = (orders || []).slice(0, 8);
      const ordersEl = document.getElementById('recent-orders');
      if (recentOrders.length === 0) {
        ordersEl.innerHTML = '<p class="empty-state">No orders yet.</p>';
      } else {
        ordersEl.innerHTML = `
          <table class="admin-table" style="font-size:0.8rem;">
            <thead><tr><th>Order</th><th>Customer</th><th>Total</th><th>Status</th></tr></thead>
            <tbody>
              ${recentOrders.map(o => `
                <tr>
                  <td><a href="/admin/orders.html">${o.order_number}</a></td>
                  <td>${o.buyer_name}</td>
                  <td>${formatPrice(o.total_cents)}</td>
                  <td><span class="status-badge status-${o.payment_status}">${o.payment_status}</span></td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        `;
      }

      // Activity feed (recent orders + waitlist signups)
      const { data: waitlistEntries } = await db
        .from('waitlist')
        .select('full_name, email, created_at, events(title)')
        .order('created_at', { ascending: false })
        .limit(10);

      const activities = [];

      // Add orders to activity
      (orders || []).slice(0, 10).forEach(o => {
        activities.push({
          type: o.payment_status === 'completed' ? 'purchase' : o.payment_status,
          text: `${o.buyer_name} ${o.payment_status === 'completed' ? 'purchased' : o.payment_status} ${o.quantity} ticket${o.quantity > 1 ? 's' : ''} for ${o.events?.title || 'event'}`,
          detail: formatPrice(o.total_cents),
          time: o.created_at,
        });
      });

      // Add waitlist to activity
      (waitlistEntries || []).forEach(w => {
        activities.push({
          type: 'waitlist',
          text: `${w.full_name} joined waitlist for ${w.events?.title || 'event'}`,
          detail: w.email,
          time: w.created_at,
        });
      });

      // Sort by time
      activities.sort((a, b) => new Date(b.time) - new Date(a.time));

      const feedEl = document.getElementById('activity-feed');
      if (activities.length === 0) {
        feedEl.innerHTML = '<p class="empty-state">No recent activity.</p>';
      } else {
        feedEl.innerHTML = `
          <div class="activity-list">
            ${activities.slice(0, 15).map(a => `
              <div class="activity-item">
                <div class="activity-dot activity-dot-${a.type}"></div>
                <div class="activity-content">
                  <span>${a.text}</span>
                  <small>${a.detail}</small>
                </div>
                <div class="activity-time">${timeAgo(a.time)}</div>
              </div>
            `).join('')}
          </div>
        `;
      }
    }

    function timeAgo(dateStr) {
      const diff = Date.now() - new Date(dateStr).getTime();
      const mins = Math.floor(diff / 60000);
      if (mins < 1) return 'just now';
      if (mins < 60) return `${mins}m ago`;
      const hours = Math.floor(mins / 60);
      if (hours < 24) return `${hours}h ago`;
      const days = Math.floor(hours / 24);
      return `${days}d ago`;
    }

    loadDashboard();
  </script>
</body>
</html>
