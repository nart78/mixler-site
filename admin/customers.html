<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customers | Mixler Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/admin.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="admin-body">
  <div class="admin-layout">
    <div class="admin-mobile-header">
      <a href="/"><img src="/images/mixler-white-wide.png" alt="Mixler" class="nav-logo-img"></a>
      <button class="admin-menu-btn" id="admin-menu-toggle">&#9776;</button>
    </div>
    <div class="admin-sidebar-overlay" id="sidebar-overlay"></div>
    <aside class="admin-sidebar" id="admin-sidebar">
      <a href="/" class="nav-logo" style="padding:24px;"><img src="/images/mixler-white-wide.png" alt="Mixler" class="nav-logo-img"></a>
      <nav class="admin-nav">
        <a href="/admin/" class="admin-nav-link">Dashboard</a>
        <a href="/admin/events.html" class="admin-nav-link">Events</a>
        <a href="/admin/orders.html" class="admin-nav-link">Orders</a>
        <a href="/admin/coupons.html" class="admin-nav-link">Coupons</a>
        <a href="/admin/customers.html" class="admin-nav-link active">Customers</a>
        <a href="/admin/messages.html" class="admin-nav-link">Messages</a>
        <a href="/admin/scan.html" class="admin-nav-link">Scan</a>
      </nav>
      <div class="admin-sidebar-footer">
        <a href="/" class="admin-nav-link">Back to Site</a>
        <a href="#" id="admin-logout" class="admin-nav-link">Log Out</a>
      </div>
    </aside>

    <main class="admin-main">
      <div class="admin-header">
        <h1>Customers</h1>
        <button class="btn btn-pink" id="export-csv">Export CSV</button>
      </div>

      <!-- Stats -->
      <div class="admin-stats" id="customer-stats" style="grid-template-columns:repeat(3,1fr);">
        <div class="stat-card">
          <div class="stat-card-label">Total Customers</div>
          <div class="stat-card-value" id="stat-total">-</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">Total Revenue</div>
          <div class="stat-card-value" id="stat-revenue">-</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">Repeat Customers</div>
          <div class="stat-card-value" id="stat-repeat">-</div>
        </div>
      </div>

      <!-- Filters -->
      <div class="admin-card" style="margin-bottom:16px;">
        <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:end;">
          <div class="form-group" style="margin-bottom:0;flex:2;min-width:220px;">
            <label style="font-size:0.78rem;font-weight:600;margin-bottom:4px;display:block;">Search</label>
            <input type="text" id="filter-search" placeholder="Name, email, or phone..." style="width:100%;">
          </div>
          <div class="form-group" style="margin-bottom:0;flex:1;min-width:160px;">
            <label style="font-size:0.78rem;font-weight:600;margin-bottom:4px;display:block;">Event</label>
            <select id="filter-event" style="width:100%;">
              <option value="">All Events</option>
            </select>
          </div>
          <div class="form-group" style="margin-bottom:0;flex:1;min-width:140px;">
            <label style="font-size:0.78rem;font-weight:600;margin-bottom:4px;display:block;">Sort By</label>
            <select id="filter-sort" style="width:100%;">
              <option value="recent">Most Recent</option>
              <option value="name">Name A-Z</option>
              <option value="spent">Most Spent</option>
              <option value="events">Most Events</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Customer List -->
      <div class="admin-card">
        <div style="overflow-x:auto;">
          <table class="admin-table" id="customers-table">
            <thead>
              <tr>
                <th>Customer</th>
                <th>Phone</th>
                <th>Events</th>
                <th>Total Spent</th>
                <th>Last Order</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="customers-body">
              <tr><td colspan="6" class="empty-state">Loading...</td></tr>
            </tbody>
          </table>
        </div>
        <div id="pagination" style="display:flex;justify-content:space-between;align-items:center;padding-top:16px;"></div>
      </div>

    </main>
  </div>

  <script type="module">
    import { requireAdmin, signOut } from '../js/auth.js';
    import { db } from '../js/supabase-client.js';
    import { formatPrice } from '../js/utils.js';

    await requireAdmin();

    document.getElementById('admin-logout').addEventListener('click', async (e) => {
      e.preventDefault();
      await signOut();
    });

    // ============================================
    // LOAD DATA
    // ============================================
    let allCustomers = [];
    let filteredCustomers = [];
    const PAGE_SIZE = 25;
    let currentPage = 0;

    // Load events for filter dropdown
    const { data: events } = await db.from('events').select('id, title').order('event_date', { ascending: false });
    const eventSelect = document.getElementById('filter-event');
    (events || []).forEach(e => {
      const opt = document.createElement('option');
      opt.value = e.id;
      opt.textContent = e.title;
      eventSelect.appendChild(opt);
    });

    // Build customer list from orders (aggregated by buyer_email)
    async function loadCustomers() {
      const { data: orders, error } = await db
        .from('orders')
        .select('id, buyer_name, buyer_email, buyer_phone, total_cents, payment_status, created_at, event_id, events(title, event_date)')
        .in('payment_status', ['completed', 'refunded'])
        .order('created_at', { ascending: false });

      if (error) {
        document.getElementById('customers-body').innerHTML =
          '<tr><td colspan="6" class="empty-state">Error loading customers.</td></tr>';
        return;
      }

      // Aggregate by email
      const customerMap = {};
      (orders || []).forEach(order => {
        const email = order.buyer_email.toLowerCase();
        if (!customerMap[email]) {
          customerMap[email] = {
            name: order.buyer_name,
            email: order.buyer_email,
            phone: order.buyer_phone || '',
            totalSpent: 0,
            orderCount: 0,
            eventIds: new Set(),
            events: [],
            lastOrderDate: order.created_at,
            orders: [],
          };
        }
        const c = customerMap[email];
        // Keep the most complete name
        if (order.buyer_name && order.buyer_name.length > c.name.length) {
          c.name = order.buyer_name;
        }
        if (order.buyer_phone && !c.phone) c.phone = order.buyer_phone;
        if (order.payment_status === 'completed') {
          c.totalSpent += order.total_cents;
        }
        c.orderCount++;
        if (order.event_id && !c.eventIds.has(order.event_id)) {
          c.eventIds.add(order.event_id);
          c.events.push({
            id: order.event_id,
            title: order.events?.title || 'Unknown',
            date: order.events?.event_date || '',
          });
        }
        c.orders.push(order);
        if (order.created_at > c.lastOrderDate) c.lastOrderDate = order.created_at;
      });

      allCustomers = Object.values(customerMap);

      // Stats
      document.getElementById('stat-total').textContent = allCustomers.length;
      const totalRevenue = allCustomers.reduce((sum, c) => sum + c.totalSpent, 0);
      document.getElementById('stat-revenue').textContent = formatPrice(totalRevenue);
      const repeatCount = allCustomers.filter(c => c.eventIds.size > 1).length;
      document.getElementById('stat-repeat').textContent = repeatCount;

      applyFilters();
    }

    // ============================================
    // FILTERS & SORT
    // ============================================
    function applyFilters() {
      const search = document.getElementById('filter-search').value.toLowerCase().trim();
      const eventId = document.getElementById('filter-event').value;
      const sort = document.getElementById('filter-sort').value;

      filteredCustomers = allCustomers.filter(c => {
        if (search && !c.name.toLowerCase().includes(search) && !c.email.toLowerCase().includes(search) && !c.phone.includes(search)) {
          return false;
        }
        if (eventId && !c.eventIds.has(eventId)) return false;
        return true;
      });

      // Sort
      if (sort === 'name') {
        filteredCustomers.sort((a, b) => a.name.localeCompare(b.name));
      } else if (sort === 'spent') {
        filteredCustomers.sort((a, b) => b.totalSpent - a.totalSpent);
      } else if (sort === 'events') {
        filteredCustomers.sort((a, b) => b.eventIds.size - a.eventIds.size);
      } else {
        filteredCustomers.sort((a, b) => new Date(b.lastOrderDate) - new Date(a.lastOrderDate));
      }

      currentPage = 0;
      renderTable();
    }

    document.getElementById('filter-search').addEventListener('input', applyFilters);
    document.getElementById('filter-event').addEventListener('change', applyFilters);
    document.getElementById('filter-sort').addEventListener('change', applyFilters);

    // ============================================
    // RENDER TABLE
    // ============================================
    let expandedEmail = null; // track which row is expanded

    function renderTable() {
      const tbody = document.getElementById('customers-body');
      const start = currentPage * PAGE_SIZE;
      const page = filteredCustomers.slice(start, start + PAGE_SIZE);

      if (filteredCustomers.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="empty-state">No customers found.</td></tr>';
        document.getElementById('pagination').innerHTML = '';
        return;
      }

      tbody.innerHTML = page.map(c => {
        const eventCount = c.eventIds.size;
        const lastDate = new Date(c.lastOrderDate).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        const isExpanded = expandedEmail === c.email;
        return `
          <tr class="customer-row" data-email="${c.email}">
            <td>
              <div style="display:flex;flex-direction:column;gap:2px;">
                <span style="font-weight:600;">${c.name}</span>
                <small>${c.email}</small>
              </div>
            </td>
            <td>${c.phone || '<span style="color:#9ca3af;">-</span>'}</td>
            <td><span class="status-badge status-published">${eventCount} event${eventCount !== 1 ? 's' : ''}</span></td>
            <td style="font-weight:600;">${formatPrice(c.totalSpent)}</td>
            <td><small>${lastDate}</small></td>
            <td><button class="btn-sm toggle-detail" data-email="${c.email}">${isExpanded ? 'Hide' : 'View'}</button></td>
          </tr>
          <tr class="detail-row" data-detail="${c.email}" style="display:${isExpanded ? 'table-row' : 'none'};">
            <td colspan="6" style="padding:0;">
              <div class="customer-detail-inner" id="detail-${c.email.replace(/[^a-zA-Z0-9]/g, '_')}">
                <div class="loading-spinner" style="padding:20px;"><div class="spinner"></div></div>
              </div>
            </td>
          </tr>
        `;
      }).join('');

      // Pagination
      const totalPages = Math.ceil(filteredCustomers.length / PAGE_SIZE);
      const pag = document.getElementById('pagination');
      if (totalPages <= 1) {
        pag.innerHTML = `<small style="color:#6b7280;">${filteredCustomers.length} customer${filteredCustomers.length !== 1 ? 's' : ''}</small>`;
      } else {
        pag.innerHTML = `
          <small style="color:#6b7280;">Showing ${start + 1}-${Math.min(start + PAGE_SIZE, filteredCustomers.length)} of ${filteredCustomers.length}</small>
          <div style="display:flex;gap:4px;">
            <button class="btn-sm" id="prev-page" ${currentPage === 0 ? 'disabled style="opacity:0.4;pointer-events:none;"' : ''}>Prev</button>
            <button class="btn-sm" id="next-page" ${currentPage >= totalPages - 1 ? 'disabled style="opacity:0.4;pointer-events:none;"' : ''}>Next</button>
          </div>
        `;
        document.getElementById('prev-page')?.addEventListener('click', () => { currentPage--; renderTable(); });
        document.getElementById('next-page')?.addEventListener('click', () => { currentPage++; renderTable(); });
      }

      // Bind toggle buttons
      tbody.querySelectorAll('.toggle-detail').forEach(btn => {
        btn.addEventListener('click', () => {
          const email = btn.dataset.email;
          const detailRow = tbody.querySelector(`tr[data-detail="${email}"]`);
          if (expandedEmail === email) {
            // Collapse
            expandedEmail = null;
            detailRow.style.display = 'none';
            btn.textContent = 'View';
          } else {
            // Collapse any previously open row
            if (expandedEmail) {
              const prevRow = tbody.querySelector(`tr[data-detail="${expandedEmail}"]`);
              const prevBtn = tbody.querySelector(`.toggle-detail[data-email="${expandedEmail}"]`);
              if (prevRow) prevRow.style.display = 'none';
              if (prevBtn) prevBtn.textContent = 'View';
            }
            // Expand this row
            expandedEmail = email;
            detailRow.style.display = 'table-row';
            btn.textContent = 'Hide';
            const customer = filteredCustomers.find(c => c.email === email) || allCustomers.find(c => c.email === email);
            if (customer) loadCustomerDetail(customer);
          }
        });
      });

      // If a row was expanded, reload its detail
      if (expandedEmail) {
        const customer = filteredCustomers.find(c => c.email === expandedEmail) || allCustomers.find(c => c.email === expandedEmail);
        if (customer) loadCustomerDetail(customer);
      }
    }

    // ============================================
    // INLINE DETAIL EXPANSION
    // ============================================
    async function loadCustomerDetail(customer) {
      const containerId = 'detail-' + customer.email.replace(/[^a-zA-Z0-9]/g, '_');
      const container = document.getElementById(containerId);
      if (!container) return;

      // Load attendee check-in data
      const { data: attendees } = await db
        .from('attendees')
        .select('id, checked_in, event_id, order_id')
        .eq('email', customer.email);

      // Build a lookup: event_id -> checked_in
      const checkinMap = {};
      (attendees || []).forEach(a => {
        checkinMap[a.event_id] = a.checked_in;
      });

      // Build transaction rows from orders
      const rows = customer.orders
        .sort((a, b) => new Date(b.created_at) - new Date(a.created_at))
        .map(o => {
          const eventTitle = o.events?.title || 'Unknown';
          const eventId = o.event_id;
          const checkedIn = checkinMap[eventId];
          const checkinBadge = checkedIn
            ? '<span class="status-badge status-completed">Yes</span>'
            : '<span class="status-badge status-pending">No</span>';
          return `
            <tr>
              <td><a href="/admin/event-edit.html?id=${eventId}">${eventTitle}</a></td>
              <td style="font-weight:600;">${formatPrice(o.total_cents)}</td>
              <td>${checkinBadge}</td>
            </tr>
          `;
        }).join('');

      container.innerHTML = `
        <div style="padding:16px 24px 20px;background:#f9fafb;border-top:1px solid #e5e7eb;">
          <table class="admin-table" style="font-size:0.85rem;margin:0;">
            <thead>
              <tr>
                <th>Event</th>
                <th>Amount Paid</th>
                <th>Checked In</th>
              </tr>
            </thead>
            <tbody>${rows || '<tr><td colspan="3" class="empty-state">No transactions.</td></tr>'}</tbody>
          </table>
        </div>
      `;
    }

    // ============================================
    // EXPORT CSV
    // ============================================
    document.getElementById('export-csv').addEventListener('click', () => {
      if (filteredCustomers.length === 0) return;
      const headers = ['Name', 'Email', 'Phone', 'Events Attended', 'Total Spent', 'Last Order'];
      const rows = filteredCustomers.map(c => [
        `"${c.name}"`,
        c.email,
        c.phone || '',
        c.eventIds.size,
        (c.totalSpent / 100).toFixed(2),
        new Date(c.lastOrderDate).toISOString().split('T')[0],
      ]);
      const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
      const blob = new Blob([csv], { type: 'text/csv' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `mixler-customers-${new Date().toISOString().split('T')[0]}.csv`;
      a.click();
      URL.revokeObjectURL(url);
    });

    loadCustomers();

    // Mobile sidebar toggle
    const menuBtn = document.getElementById('admin-menu-toggle');
    const sidebar = document.getElementById('admin-sidebar');
    const overlay = document.getElementById('sidebar-overlay');
    if (menuBtn) {
      menuBtn.addEventListener('click', () => {
        sidebar.classList.toggle('open');
        overlay.classList.toggle('open');
      });
      overlay.addEventListener('click', () => {
        sidebar.classList.remove('open');
        overlay.classList.remove('open');
      });
    }
  </script>
</body>
</html>
