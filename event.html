<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event | Mixler</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/events-page.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <div id="site-nav"></div>

  <section class="event-detail" style="padding-top: 120px;">
    <div class="container">
      <div id="event-content">
        <div class="loading-spinner"><div class="spinner"></div></div>
      </div>
    </div>
  </section>

  <div id="site-footer"></div>

  <script type="module">
    import { renderNav, renderFooter, showToast } from './js/components.js';
    import { db, SUPABASE_URL, SUPABASE_ANON_KEY } from './js/supabase-client.js';
    import { getSession } from './js/auth.js';
    import { formatDate, formatTime, formatPrice, googleCalendarUrl, downloadICS, outlookCalendarUrl, getParam } from './js/utils.js';

    renderNav();
    renderFooter();

    const slug = getParam('slug');
    if (!slug) {
      window.location.href = '/events.html';
    }

    async function loadEvent() {
      const container = document.getElementById('event-content');

      const { data: event, error } = await db
        .from('events')
        .select('*')
        .eq('slug', slug)
        .eq('status', 'published')
        .single();

      if (error || !event) {
        container.innerHTML = `
          <div class="text-center" style="padding: 60px 0;">
            <h2>Event not found</h2>
            <p style="margin: 16px 0 32px;">This event may have been removed or hasn't been published yet.</p>
            <a href="/events.html" class="btn btn-primary">Browse Events</a>
          </div>`;
        return;
      }

      // Fetch ticket types for this event
      const { data: ticketTypes } = await db
        .from('ticket_types')
        .select('*')
        .eq('event_id', event.id)
        .eq('is_active', true)
        .order('sort_order', { ascending: true });

      // Update page title
      document.title = `${event.title} | Mixler`;

      const isComingSoon = event.event_date >= '2099-01-01';
      const spotsLeft = event.capacity - event.tickets_sold;
      const soldOut = spotsLeft <= 0;
      const price = formatPrice(event.price_cents);
      const earlyBirdActive = event.early_bird_price_cents && event.early_bird_deadline && new Date(event.early_bird_deadline) > new Date();
      const displayPrice = earlyBirdActive ? formatPrice(event.early_bird_price_cents) : price;

      // Build ticket types HTML
      const hasMultipleTypes = ticketTypes && ticketTypes.length > 1;
      let ticketTypesHtml = '';
      if (hasMultipleTypes && !isComingSoon) {
        ticketTypesHtml = `
          <div class="ticket-types-list">
            ${ticketTypes.map(tt => {
              const ttSpotsLeft = tt.capacity > 0 ? tt.capacity - tt.tickets_sold : 999;
              const ttSoldOut = ttSpotsLeft <= 0;
              return `
                <div class="ticket-type-row ${ttSoldOut ? 'sold-out' : ''}">
                  <div class="ticket-type-info">
                    <strong>${tt.name}</strong>
                    ${tt.description ? `<span>${tt.description}</span>` : ''}
                  </div>
                  <div class="ticket-type-price">${ttSoldOut ? 'Sold Out' : formatPrice(tt.price_cents)}</div>
                </div>
              `;
            }).join('')}
          </div>
        `;
      }

      // Determine the lowest available price for the "from" display
      let lowestPrice = event.price_cents;
      if (ticketTypes && ticketTypes.length > 0) {
        const availableTypes = ticketTypes.filter(tt => tt.capacity <= 0 || tt.tickets_sold < tt.capacity);
        if (availableTypes.length > 0) {
          lowestPrice = Math.min(...availableTypes.map(tt => tt.price_cents));
        }
      }
      if (earlyBirdActive && !hasMultipleTypes) lowestPrice = event.early_bird_price_cents;

      // Build meta section (hide for TBD events)
      const metaHtml = isComingSoon ? '' : `
        <div class="event-detail-meta">
          <div class="meta-item">
            <strong>Date</strong>
            <span>${formatDate(event.event_date)}</span>
          </div>
          <div class="meta-item">
            <strong>Time</strong>
            <span>${formatTime(event.start_time)}${event.end_time ? ' - ' + formatTime(event.end_time) : ''}</span>
          </div>
          <div class="meta-item">
            <strong>Location</strong>
            <span>${event.location_name || ''}${event.location_address ? '<br>' + event.location_address : ''}</span>
          </div>
        </div>
      `;

      // Build sidebar content based on TBD vs regular
      let sidebarContent = '';
      if (isComingSoon) {
        sidebarContent = `
          <div class="ticket-box">
            <div class="coming-soon-box">
              <span class="coming-soon-badge">Coming Soon</span>
              <p class="coming-soon-text">Date and details are being finalized. Sign up to get notified when tickets go live.</p>
            </div>
            <button class="btn btn-primary" id="btn-get-notified" style="width:100%;padding:16px;">Get Notified</button>
            <form class="notify-form" id="notify-form" style="display:none;">
              <input type="text" id="notify-first" placeholder="First name" required>
              <input type="text" id="notify-last" placeholder="Last name" required>
              <input type="email" id="notify-email" placeholder="Email address" required>
              <button type="submit" class="btn btn-primary" style="width:100%;">Subscribe</button>
              <p class="notify-note">Unsubscribe anytime.</p>
              <div class="notify-msg" id="notify-msg"></div>
            </form>
          </div>
        `;
      } else {
        sidebarContent = `
          <div class="ticket-box">
            <div class="ticket-price">
              ${earlyBirdActive && !hasMultipleTypes ? `<span class="early-bird-badge">Early Bird</span>` : ''}
              <span class="price">${hasMultipleTypes ? 'From ' : ''}${formatPrice(lowestPrice)}</span>
              ${earlyBirdActive && !hasMultipleTypes ? `<span class="original-price">${price}</span>` : ''}
              <span class="per-ticket">per ticket</span>
            </div>
            ${ticketTypesHtml}
            <div class="ticket-availability">
              ${soldOut
                ? '<span class="sold-out">Sold Out</span>'
                : `<span class="spots-left">${spotsLeft} spot${spotsLeft !== 1 ? 's' : ''} left</span>`
              }
            </div>
            ${soldOut ? `
              <div class="waitlist-form" id="waitlist-form">
                <h4>Join the Waitlist</h4>
                <p>Get notified if a spot opens up.</p>
                <input type="text" id="wl-name" placeholder="Full name" required>
                <input type="email" id="wl-email" placeholder="Email" required>
                <input type="tel" id="wl-phone" placeholder="Phone (optional)">
                <button class="btn btn-primary" id="wl-submit" style="width:100%;">Join Waitlist</button>
              </div>
            ` : `
              <a href="/checkout.html?slug=${event.slug}" class="btn btn-primary" style="width:100%;padding:16px;">Get Tickets</a>
            `}
            <div class="add-to-calendar">
              <strong>Add to Calendar</strong>
              <div class="calendar-buttons">
                <a href="${googleCalendarUrl(event)}" target="_blank" class="cal-btn">Google</a>
                <button class="cal-btn" id="ics-download">Apple</button>
                <a href="${outlookCalendarUrl(event)}" target="_blank" class="cal-btn">Outlook</a>
              </div>
            </div>
          </div>
        `;
      }

      container.innerHTML = `
        <a href="/events.html" class="back-link">&larr; All Events</a>
        <div class="event-detail-grid">
          <div class="event-detail-main">
            <div class="event-detail-image" ${event.image_url ? `style="background-image:url('${event.image_url}');background-size:cover;background-position:center;"` : ''}></div>
            <h1>${event.title}</h1>
            ${metaHtml}
            <div class="event-description">
              ${event.description ? event.description.split('\n').map(p => `<p>${p}</p>`).join('') : ''}
            </div>
          </div>
          <div class="event-detail-sidebar">
            ${sidebarContent}
          </div>
        </div>
      `;

      // ICS download handler
      const icsBtn = document.getElementById('ics-download');
      if (icsBtn) {
        icsBtn.addEventListener('click', () => downloadICS(event));
      }

      // Get Notified toggle + newsletter form handler
      const notifyBtn = document.getElementById('btn-get-notified');
      const notifyForm = document.getElementById('notify-form');
      if (notifyBtn && notifyForm) {
        notifyBtn.addEventListener('click', () => {
          notifyBtn.style.display = 'none';
          notifyForm.style.display = '';
          document.getElementById('notify-first').focus();
        });

        notifyForm.addEventListener('submit', async (e) => {
          e.preventDefault();
          const name = document.getElementById('notify-first').value.trim();
          const last_name = document.getElementById('notify-last').value.trim();
          const email = document.getElementById('notify-email').value.trim();
          const msgEl = document.getElementById('notify-msg');
          if (!email) return;

          msgEl.textContent = 'Subscribing...';
          msgEl.className = 'notify-msg';

          try {
            const res = await fetch(`${SUPABASE_URL}/functions/v1/newsletter-subscribe`, {
              method: 'POST',
              headers: {
                'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                'Content-Type': 'application/json',
              },
              body: JSON.stringify({ name, last_name, email }),
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || 'Request failed');
            notifyForm.innerHTML = `
              <div class="notify-success">
                <strong>You're on the list!</strong>
                <p>We'll let you know when this event is ready.</p>
              </div>
            `;
          } catch (err) {
            msgEl.textContent = 'Something went wrong. Please try again.';
            msgEl.className = 'notify-msg msg-error';
          }
        });
      }

      // Waitlist submit handler
      const wlSubmit = document.getElementById('wl-submit');
      if (wlSubmit) {
        wlSubmit.addEventListener('click', async () => {
          const name = document.getElementById('wl-name').value.trim();
          const email = document.getElementById('wl-email').value.trim();
          const phone = document.getElementById('wl-phone').value.trim();

          if (!name || !email) {
            showToast('Please fill in your name and email.', 'error');
            return;
          }

          wlSubmit.disabled = true;
          wlSubmit.textContent = 'Joining...';

          const { error } = await db.from('waitlist').insert({
            event_id: event.id,
            full_name: name,
            email,
            phone: phone || null
          });

          if (error) {
            if (error.code === '23505') {
              showToast('You\'re already on the waitlist for this event.', 'info');
            } else {
              showToast('Something went wrong. Please try again.', 'error');
            }
            wlSubmit.disabled = false;
            wlSubmit.textContent = 'Join Waitlist';
            return;
          }

          document.getElementById('waitlist-form').innerHTML = `
            <div class="text-center" style="padding: 20px 0;">
              <h4>You're on the list!</h4>
              <p>We'll email you at ${email} if a spot opens up.</p>
            </div>
          `;
          showToast('Added to waitlist!', 'success');
        });
      }
    }

    loadEvent();
  </script>
</body>
</html>
