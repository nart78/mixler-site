<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout | Mixler</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/events-page.css">
  <link rel="stylesheet" href="css/checkout.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <div id="site-nav"></div>

  <section class="checkout-section">
    <div class="container">
      <a href="javascript:history.back()" class="back-link">&larr; Back to event</a>
      <div id="checkout-content">
        <div class="loading-spinner"><div class="spinner"></div></div>
      </div>
    </div>
  </section>

  <div id="site-footer"></div>

  <script type="module">
    import { renderNav, renderFooter, showToast } from './js/components.js';
    import { db, SUPABASE_URL, SUPABASE_ANON_KEY } from './js/supabase-client.js';
    import { getSession, getCurrentUser, signIn, signUpAutoConfirm, signInWithProvider, signOut } from './js/auth.js';
    import { formatDate, formatTime, formatPrice, getParam } from './js/utils.js';

    renderNav();
    renderFooter();

    const slug = getParam('slug');
    if (!slug) {
      window.location.href = '/events.html';
    }

    let currentEvent = null;
    let ticketTypes = [];
    let selectedTicketType = null;
    let quantity = 1;
    let couponResult = null;
    let currentSession = null;
    let currentProfile = null;

    async function loadCheckout() {
      const container = document.getElementById('checkout-content');

      // Fetch event
      const { data: event, error } = await db
        .from('events')
        .select('*')
        .eq('slug', slug)
        .eq('status', 'published')
        .single();

      if (error || !event) {
        container.innerHTML = `
          <div class="text-center" style="padding: 60px 0;">
            <h2>Event not found</h2>
            <p style="margin: 16px 0 32px;">This event may have been removed or hasn't been published yet.</p>
            <a href="/events.html" class="btn btn-primary">Browse Events</a>
          </div>`;
        return;
      }

      currentEvent = event;
      document.title = `Checkout - ${event.title} | Mixler`;

      // Fetch ticket types
      const { data: types } = await db
        .from('ticket_types')
        .select('*')
        .eq('event_id', event.id)
        .eq('is_active', true)
        .order('sort_order', { ascending: true });

      ticketTypes = types || [];
      if (ticketTypes.length > 0) {
        selectedTicketType = ticketTypes[0];
      }

      renderCheckoutForm();
    }

    function renderCheckoutForm() {
      const event = currentEvent;
      const container = document.getElementById('checkout-content');
      const spotsLeft = event.capacity - event.tickets_sold;
      const maxQty = Math.min(spotsLeft, event.max_tickets_per_order || 10);

      // Determine pricing
      let pricePerTicket = event.price_cents;
      if (selectedTicketType) {
        pricePerTicket = selectedTicketType.price_cents;
      } else {
        const earlyBirdActive = event.early_bird_price_cents && event.early_bird_deadline && new Date(event.early_bird_deadline) > new Date();
        if (earlyBirdActive) pricePerTicket = event.early_bird_price_cents;
      }

      container.innerHTML = `
        <div class="checkout-grid">
          <div class="checkout-form">
            <h1>Get Your Tickets</h1>

            ${ticketTypes.length > 1 ? `
              <div class="form-section">
                <h3>Select Ticket Type</h3>
                <div class="ticket-type-options">
                  ${ticketTypes.map(tt => {
                    const ttSpotsLeft = tt.capacity > 0 ? tt.capacity - tt.tickets_sold : 999;
                    const available = ttSpotsLeft > 0;
                    return `
                      <label class="ticket-type-option ${tt.id === selectedTicketType?.id ? 'selected' : ''} ${!available ? 'sold-out' : ''}" data-tt-id="${tt.id}">
                        <input type="radio" name="ticket_type" value="${tt.id}" ${tt.id === selectedTicketType?.id ? 'checked' : ''} ${!available ? 'disabled' : ''}>
                        <div class="tt-info">
                          <strong>${tt.name}</strong>
                          ${tt.description ? `<span class="tt-desc">${tt.description}</span>` : ''}
                        </div>
                        <div class="tt-price">
                          ${available ? formatPrice(tt.price_cents) : 'Sold Out'}
                        </div>
                      </label>
                    `;
                  }).join('')}
                </div>
              </div>
            ` : ''}

            <div class="form-section">
              <h3>How many tickets?</h3>
              <div class="quantity-picker">
                <button class="qty-btn" id="qty-minus" ${quantity <= 1 ? 'disabled' : ''}>-</button>
                <span class="qty-value" id="qty-value">${quantity}</span>
                <button class="qty-btn" id="qty-plus" ${quantity >= maxQty ? 'disabled' : ''}>+</button>
                <span class="qty-note">${spotsLeft} spot${spotsLeft !== 1 ? 's' : ''} left</span>
              </div>
            </div>

            <!-- Account Section -->
            <div class="form-section" id="auth-section">
              ${currentSession ? `
                <div class="checkout-auth-confirmed" id="auth-confirmed">
                  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="rgba(255,52,101,0.5)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
                  <div class="auth-confirmed-info">
                    <strong>${currentProfile?.full_name || currentSession.user.email}</strong>
                    <span>${currentSession.user.email}</span>
                  </div>
                  <a href="#" class="auth-logout-link" id="auth-logout">Not you? Log out</a>
                </div>
              ` : `
                <div id="auth-forms">
                  <h3>Your Account</h3>
                  <p class="form-note">Log in or create an account to continue with your purchase.</p>

                  <div class="checkout-auth-tabs">
                    <button class="checkout-auth-tab active" data-tab="checkout-login">Log In</button>
                    <button class="checkout-auth-tab" data-tab="checkout-signup">Sign Up</button>
                  </div>

                  <form id="checkout-login-form" class="checkout-auth-form">
                    <div class="form-group">
                      <label for="auth-login-email">Email</label>
                      <input type="email" id="auth-login-email" required placeholder="you@example.com">
                    </div>
                    <div class="form-group">
                      <label for="auth-login-password">Password</label>
                      <input type="password" id="auth-login-password" required placeholder="Your password">
                    </div>
                    <div id="auth-login-error" class="form-error"></div>
                    <button type="submit" class="btn btn-primary" style="width:100%;">Log In</button>
                  </form>

                  <form id="checkout-signup-form" class="checkout-auth-form" style="display:none;">
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
                      <div class="form-group">
                        <label for="auth-signup-first">First Name</label>
                        <input type="text" id="auth-signup-first" required placeholder="Jane">
                      </div>
                      <div class="form-group">
                        <label for="auth-signup-last">Last Name</label>
                        <input type="text" id="auth-signup-last" required placeholder="Smith">
                      </div>
                    </div>
                    <div class="form-group">
                      <label for="auth-signup-email">Email</label>
                      <input type="email" id="auth-signup-email" required placeholder="you@example.com">
                    </div>
                    <div class="form-group">
                      <label for="auth-signup-password">Password</label>
                      <input type="password" id="auth-signup-password" required minlength="6" placeholder="Min 6 characters">
                    </div>
                    <div id="auth-signup-error" class="form-error"></div>
                    <button type="submit" class="btn btn-primary" style="width:100%;">Create Account & Continue</button>
                  </form>

                  <div class="auth-divider"><span>or</span></div>

                  <div class="social-login">
                    <button class="btn-social btn-google" id="checkout-btn-google">
                      <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                      Continue with Google
                    </button>
                  </div>
                </div>
              `}
            </div>

            <div class="form-section checkout-gated ${currentSession ? '' : 'gated'}" id="attendees-section">
              <h3>Attendee Details</h3>
              <p class="form-note">We need the name of each person attending. Email is optional but helps us send them event updates.</p>
              <div id="attendee-fields"></div>
            </div>

            <div class="form-section checkout-gated ${currentSession ? '' : 'gated'}">
              <h3>Have a coupon?</h3>
              <div class="coupon-row">
                <input type="text" id="coupon-code" placeholder="Enter code" class="coupon-input">
                <button class="btn btn-outline coupon-apply" id="apply-coupon">Apply</button>
              </div>
              <div id="coupon-result"></div>
            </div>
          </div>

          <div class="checkout-sidebar">
            <div class="order-summary">
              <h3>Order Summary</h3>
              <div class="summary-event">
                <div class="summary-event-image" ${event.image_url ? `style="background-image:url('${event.image_url}')"` : ''}></div>
                <div class="summary-event-info">
                  <strong>${event.title}</strong>
                  <span>${formatDate(event.event_date)}</span>
                  <span>${formatTime(event.start_time)}${event.end_time ? ' - ' + formatTime(event.end_time) : ''}</span>
                  <span>${event.location_name || ''}</span>
                </div>
              </div>
              <div class="summary-lines" id="summary-lines"></div>
              <button class="btn btn-primary checkout-btn" id="checkout-btn" ${currentSession ? '' : 'disabled'}>Proceed to Payment</button>
              <p class="checkout-note">${currentSession ? "You'll be redirected to Stripe for secure payment. Your tickets are held for 15 minutes." : 'Log in or create an account above to continue.'}</p>
            </div>
          </div>
        </div>
      `;

      // Render attendee fields and summary
      renderAttendeeFields();
      updateSummary();
      attachEventListeners();
      attachAuthListeners();
    }

    function renderAttendeeFields() {
      const container = document.getElementById('attendee-fields');
      if (!container) return;

      let html = '';
      for (let i = 0; i < quantity; i++) {
        const isFirst = i === 0;
        html += `
          <div class="attendee-card" data-index="${i}">
            <div class="attendee-header">Attendee ${i + 1} ${isFirst ? '<span class="badge-you">You</span>' : ''}</div>
            <div class="form-row">
              <div class="form-group">
                <label>First Name *</label>
                <input type="text" class="attendee-first" data-index="${i}" placeholder="First name" required>
              </div>
              <div class="form-group">
                <label>Last Name *</label>
                <input type="text" class="attendee-last" data-index="${i}" placeholder="Last name" required>
              </div>
              <div class="form-group">
                <label>Email (optional)</label>
                <input type="email" class="attendee-email" data-index="${i}" placeholder="Email address">
              </div>
            </div>
          </div>
        `;
      }
      container.innerHTML = html;

      // Auto-fill first attendee from buyer info
      syncBuyerToAttendee();
    }

    function syncBuyerToAttendee() {
      const firstAttendeeFirst = document.querySelector('.attendee-first[data-index="0"]');
      const firstAttendeeLast = document.querySelector('.attendee-last[data-index="0"]');
      const firstAttendeeEmail = document.querySelector('.attendee-email[data-index="0"]');

      if (currentProfile?.full_name) {
        const parts = currentProfile.full_name.trim().split(/\s+/);
        if (firstAttendeeFirst) firstAttendeeFirst.value = parts[0] || '';
        if (firstAttendeeLast) firstAttendeeLast.value = parts.slice(1).join(' ') || '';
      }
      if (firstAttendeeEmail && currentSession?.user?.email) {
        firstAttendeeEmail.value = currentSession.user.email;
      }
    }

    function updateSummary() {
      const container = document.getElementById('summary-lines');
      if (!container || !currentEvent) return;

      let pricePerTicket = currentEvent.price_cents;
      let ticketLabel = 'General Admission';

      if (selectedTicketType) {
        pricePerTicket = selectedTicketType.price_cents;
        ticketLabel = selectedTicketType.name;
      } else {
        const earlyBirdActive = currentEvent.early_bird_price_cents && currentEvent.early_bird_deadline && new Date(currentEvent.early_bird_deadline) > new Date();
        if (earlyBirdActive) {
          pricePerTicket = currentEvent.early_bird_price_cents;
          ticketLabel = 'Early Bird';
        }
      }

      const subtotal = pricePerTicket * quantity;
      const discount = couponResult?.discount_cents || 0;
      const afterDiscount = subtotal - discount;
      const taxRate = currentEvent.tax_rate_bps || 500;
      const taxPct = (taxRate / 100).toFixed(1).replace(/\.0$/, '');
      const tax = Math.round(afterDiscount * taxRate / 10000);
      const ccFee = currentEvent.pass_cc_fee ? Math.round((afterDiscount + tax) * 300 / 10000) : 0;
      const total = afterDiscount + tax + ccFee;

      container.innerHTML = `
        <div class="summary-line">
          <span>${ticketLabel} x ${quantity}</span>
          <span>${formatPrice(subtotal)}</span>
        </div>
        ${discount > 0 ? `
          <div class="summary-line discount">
            <span>Discount</span>
            <span>-${formatPrice(discount)}</span>
          </div>
        ` : ''}
        <div class="summary-line">
          <span>GST (${taxPct}%)</span>
          <span>${formatPrice(tax)}</span>
        </div>
        ${ccFee > 0 ? `
          <div class="summary-line">
            <span>Card processing fee (3%)</span>
            <span>${formatPrice(ccFee)}</span>
          </div>
        ` : ''}
        <div class="summary-line total">
          <span>Total</span>
          <span>${formatPrice(total)}</span>
        </div>
      `;
    }

    function attachEventListeners() {
      // Quantity buttons
      const minusBtn = document.getElementById('qty-minus');
      const plusBtn = document.getElementById('qty-plus');
      const qtyValue = document.getElementById('qty-value');
      const maxQty = Math.min(
        currentEvent.capacity - currentEvent.tickets_sold,
        currentEvent.max_tickets_per_order || 10
      );

      if (minusBtn) {
        minusBtn.addEventListener('click', () => {
          if (quantity > 1) {
            quantity--;
            qtyValue.textContent = quantity;
            minusBtn.disabled = quantity <= 1;
            plusBtn.disabled = quantity >= maxQty;
            renderAttendeeFields();
            updateSummary();
          }
        });
      }

      if (plusBtn) {
        plusBtn.addEventListener('click', () => {
          if (quantity < maxQty) {
            quantity++;
            qtyValue.textContent = quantity;
            minusBtn.disabled = quantity <= 1;
            plusBtn.disabled = quantity >= maxQty;
            renderAttendeeFields();
            updateSummary();
          }
        });
      }

      // Ticket type selection
      document.querySelectorAll('.ticket-type-option input[name="ticket_type"]').forEach(radio => {
        radio.addEventListener('change', (e) => {
          const ttId = e.target.value;
          selectedTicketType = ticketTypes.find(t => t.id === ttId);
          document.querySelectorAll('.ticket-type-option').forEach(el => el.classList.remove('selected'));
          e.target.closest('.ticket-type-option').classList.add('selected');
          couponResult = null;
          document.getElementById('coupon-result').innerHTML = '';
          document.getElementById('coupon-code').value = '';
          updateSummary();
        });
      });

      // Coupon apply
      const couponBtn = document.getElementById('apply-coupon');
      if (couponBtn) {
        couponBtn.addEventListener('click', applyCoupon);
      }

      // Checkout button
      const checkoutBtn = document.getElementById('checkout-btn');
      if (checkoutBtn) {
        checkoutBtn.addEventListener('click', handleCheckout);
      }
    }

    function attachAuthListeners() {
      // Tab switching
      document.querySelectorAll('.checkout-auth-tab').forEach(tab => {
        tab.addEventListener('click', () => {
          document.querySelectorAll('.checkout-auth-tab').forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          const loginForm = document.getElementById('checkout-login-form');
          const signupForm = document.getElementById('checkout-signup-form');
          if (loginForm) loginForm.style.display = tab.dataset.tab === 'checkout-login' ? '' : 'none';
          if (signupForm) signupForm.style.display = tab.dataset.tab === 'checkout-signup' ? '' : 'none';
        });
      });

      // Login form
      const loginForm = document.getElementById('checkout-login-form');
      if (loginForm) {
        loginForm.addEventListener('submit', async (e) => {
          e.preventDefault();
          const email = document.getElementById('auth-login-email').value;
          const password = document.getElementById('auth-login-password').value;
          const errorEl = document.getElementById('auth-login-error');
          const submitBtn = loginForm.querySelector('button[type="submit"]');
          errorEl.textContent = '';
          submitBtn.disabled = true;
          submitBtn.textContent = 'Logging in...';

          try {
            await signIn(email, password);
            await onAuthSuccess();
          } catch (err) {
            errorEl.textContent = err.message === 'Invalid login credentials'
              ? 'Wrong email or password. Please try again.'
              : err.message;
            submitBtn.disabled = false;
            submitBtn.textContent = 'Log In';
          }
        });
      }

      // Signup form
      const signupForm = document.getElementById('checkout-signup-form');
      if (signupForm) {
        signupForm.addEventListener('submit', async (e) => {
          e.preventDefault();
          const name = (document.getElementById('auth-signup-first').value.trim() + ' ' + document.getElementById('auth-signup-last').value.trim()).trim();
          const email = document.getElementById('auth-signup-email').value;
          const password = document.getElementById('auth-signup-password').value;
          const errorEl = document.getElementById('auth-signup-error');
          const submitBtn = signupForm.querySelector('button[type="submit"]');
          errorEl.textContent = '';
          submitBtn.disabled = true;
          submitBtn.textContent = 'Creating account...';

          try {
            await signUpAutoConfirm(email, password, name);
            await onAuthSuccess();
          } catch (err) {
            errorEl.textContent = err.message;
            submitBtn.disabled = false;
            submitBtn.textContent = 'Create Account & Continue';
          }
        });
      }

      // Social login
      const googleBtn = document.getElementById('checkout-btn-google');
      if (googleBtn) {
        googleBtn.addEventListener('click', async () => {
          try {
            const redirectUrl = window.location.origin + `/checkout.html?slug=${slug}`;
            await signInWithProvider('google', redirectUrl);
          } catch (err) {
            const errorEl = document.getElementById('auth-login-error');
            if (errorEl) errorEl.textContent = err.message;
          }
        });
      }

      // Logout link
      const logoutLink = document.getElementById('auth-logout');
      if (logoutLink) {
        logoutLink.addEventListener('click', async (e) => {
          e.preventDefault();
          await db.auth.signOut();
          currentSession = null;
          currentProfile = null;
          renderCheckoutForm();
        });
      }
    }

    async function onAuthSuccess() {
      const session = await getSession();
      if (!session) return;
      currentSession = session;

      const { data: profile } = await db
        .from('profiles')
        .select('*')
        .eq('id', session.user.id)
        .single();
      currentProfile = profile;

      // Re-render the form with auth state
      renderCheckoutForm();
    }

    async function applyCoupon() {
      const codeInput = document.getElementById('coupon-code');
      const resultDiv = document.getElementById('coupon-result');
      const code = codeInput.value.trim();

      if (!code) {
        resultDiv.innerHTML = '';
        couponResult = null;
        updateSummary();
        return;
      }

      let pricePerTicket = selectedTicketType?.price_cents || currentEvent.price_cents;
      const subtotal = pricePerTicket * quantity;

      try {
        const response = await fetch(`${SUPABASE_URL}/functions/v1/validate-coupon`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            code,
            event_id: currentEvent.id,
            subtotal_cents: subtotal,
          }),
        });

        const data = await response.json();

        if (data.valid) {
          couponResult = data;
          resultDiv.innerHTML = `<div class="coupon-success">Coupon applied: ${data.coupon.description || data.coupon.code} (-${formatPrice(data.discount_cents)})</div>`;
        } else {
          couponResult = null;
          resultDiv.innerHTML = `<div class="coupon-error">${data.error}</div>`;
        }
      } catch (err) {
        couponResult = null;
        resultDiv.innerHTML = `<div class="coupon-error">Could not validate coupon</div>`;
      }

      updateSummary();
    }

    async function handleCheckout() {
      const btn = document.getElementById('checkout-btn');

      // Require auth
      if (!currentSession) {
        showToast('Please log in or create an account to continue.', 'error');
        return;
      }

      const buyerName = currentProfile?.full_name || currentSession.user.email;
      const buyerEmail = currentSession.user.email;
      const buyerPhone = currentProfile?.phone || '';

      // Validate attendee names
      const attendees = [];
      for (let i = 0; i < quantity; i++) {
        const firstInput = document.querySelector(`.attendee-first[data-index="${i}"]`);
        const lastInput = document.querySelector(`.attendee-last[data-index="${i}"]`);
        const emailInput = document.querySelector(`.attendee-email[data-index="${i}"]`);
        const first = firstInput?.value?.trim();
        const last = lastInput?.value?.trim();
        const email = emailInput?.value?.trim();

        if (!first) {
          showToast(`Please enter a first name for Attendee ${i + 1}.`, 'error');
          firstInput?.focus();
          return;
        }
        if (!last) {
          showToast(`Please enter a last name for Attendee ${i + 1}.`, 'error');
          lastInput?.focus();
          return;
        }

        attendees.push({ full_name: (first + ' ' + last).trim(), email: email || null });
      }

      btn.disabled = true;
      btn.textContent = 'Processing...';

      try {
        // Get auth token if logged in
        const session = await getSession();
        const headers = {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
        };
        if (session?.access_token) {
          headers['x-user-token'] = session.access_token;
        }

        const response = await fetch(`${SUPABASE_URL}/functions/v1/create-checkout-session`, {
          method: 'POST',
          headers,
          body: JSON.stringify({
            event_slug: slug,
            ticket_type_id: selectedTicketType?.id || null,
            quantity,
            attendees,
            coupon_code: couponResult?.coupon?.code || null,
            buyer_name: buyerName,
            buyer_email: buyerEmail,
            buyer_phone: buyerPhone || null,
          }),
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Checkout failed');
        }

        // Redirect to Stripe Checkout
        window.location.href = data.checkout_url;

      } catch (err) {
        showToast(err.message || 'Something went wrong. Please try again.', 'error');
        btn.disabled = false;
        btn.textContent = 'Proceed to Payment';
      }
    }

    async function init() {
      // Check session first (handles OAuth redirect back)
      const session = await getSession();
      if (session) {
        currentSession = session;
        const { data: profile } = await db
          .from('profiles')
          .select('*')
          .eq('id', session.user.id)
          .single();
        currentProfile = profile;
      }
      await loadCheckout();
    }

    init();
  </script>
</body>
