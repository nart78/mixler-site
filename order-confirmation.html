<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-JHJEMRXRR1"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-JHJEMRXRR1');
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Confirmed | Mixler</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/events-page.css">
  <link rel="stylesheet" href="css/checkout.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js"></script>
</head>
<body>

  <div id="site-nav"></div>

  <section class="confirmation-section">
    <div class="container">
      <div id="confirmation-content">
        <div class="loading-spinner"><div class="spinner"></div></div>
      </div>
    </div>
  </section>

  <div id="site-footer"></div>

  <script type="module">
    import { renderNav, renderFooter } from './js/components.js';
    import { db } from './js/supabase-client.js';
    import { formatDate, formatTime, formatPrice, googleCalendarUrl, downloadICS, outlookCalendarUrl, getParam } from './js/utils.js';
    import { generateTicketPDF, generateSingleTicketBase64 } from './js/ticket-pdf.js';
    import { SUPABASE_URL, SUPABASE_ANON_KEY } from './js/supabase-client.js';

    renderNav();
    renderFooter();

    const orderNumber = getParam('order');
    if (!orderNumber) {
      window.location.href = '/events.html';
    }

    async function loadConfirmation() {
      const container = document.getElementById('confirmation-content');

      // Fetch order with event details
      const { data: order, error: orderError } = await db
        .from('orders')
        .select('*, events(*)')
        .eq('order_number', orderNumber)
        .single();

      if (orderError || !order) {
        container.innerHTML = `
          <div class="text-center" style="padding: 60px 0;">
            <h2>Order not found</h2>
            <p style="margin: 16px 0 32px;">We couldn't find this order. Check your email for confirmation details.</p>
            <a href="/events.html" class="btn btn-primary">Browse Events</a>
          </div>`;
        return;
      }

      const event = order.events;
      document.title = `Order ${order.order_number} | Mixler`;

      // Fetch attendees for this order
      const { data: attendees } = await db
        .from('attendees')
        .select('*')
        .eq('order_id', order.id);

      const isPending = order.payment_status === 'pending';
      const isCompleted = order.payment_status === 'completed';

      container.innerHTML = `
        <div class="confirmation-card">
          <div class="confirmation-header">
            ${isCompleted ? `
              <div class="success-icon">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                  <polyline points="22 4 12 14.01 9 11.01"/>
                </svg>
              </div>
              <h1>You're in!</h1>
              <p class="confirmation-subtitle">Your tickets for <strong>${event.title}</strong> are confirmed.</p>
            ` : isPending ? `
              <div class="pending-icon">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="12" cy="12" r="10"/>
                  <polyline points="12 6 12 12 16 14"/>
                </svg>
              </div>
              <h1>Payment Processing</h1>
              <p class="confirmation-subtitle">Your payment is being processed. You'll receive a confirmation email shortly.</p>
            ` : `
              <h1>Order ${order.order_number}</h1>
              <p class="confirmation-subtitle">Status: ${order.payment_status}</p>
            `}
          </div>

          <div class="confirmation-details">
            <div class="detail-section">
              <h3>Event Details</h3>
              <div class="detail-grid">
                <div class="detail-item">
                  <span class="detail-label">Event</span>
                  <span class="detail-value">${event.title}</span>
                </div>
                <div class="detail-item">
                  <span class="detail-label">Date</span>
                  <span class="detail-value">${formatDate(event.event_date)}</span>
                </div>
                <div class="detail-item">
                  <span class="detail-label">Time</span>
                  <span class="detail-value">${formatTime(event.start_time)}${event.end_time ? ' - ' + formatTime(event.end_time) : ''}</span>
                </div>
                <div class="detail-item">
                  <span class="detail-label">Location</span>
                  <span class="detail-value">${event.location_name || ''}${event.location_address ? ', ' + event.location_address : ''}</span>
                </div>
              </div>
            </div>

            <div class="detail-section">
              <h3>Order Details</h3>
              <div class="detail-grid">
                <div class="detail-item">
                  <span class="detail-label">Order Number</span>
                  <span class="detail-value">${order.order_number}</span>
                </div>
                <div class="detail-item">
                  <span class="detail-label">Tickets</span>
                  <span class="detail-value">${order.quantity}</span>
                </div>
                <div class="detail-item">
                  <span class="detail-label">Total Paid</span>
                  <span class="detail-value">${formatPrice(order.total_cents)}</span>
                </div>
                <div class="detail-item">
                  <span class="detail-label">Buyer</span>
                  <span class="detail-value">${order.buyer_name} (${order.buyer_email})</span>
                </div>
              </div>
            </div>

            ${attendees && attendees.length > 0 ? `
              <div class="detail-section">
                <h3>Attendees</h3>
                <div class="attendee-list">
                  ${attendees.map((a, i) => `
                    <div class="attendee-row" data-attendee-index="${i}">
                      <div class="attendee-info">
                        <strong>${a.full_name}</strong>
                        ${a.email ? `<span>${a.email}</span>` : ''}
                      </div>
                      <div class="attendee-actions">
                        <button class="btn-email-ticket" data-index="${i}" data-has-email="${a.email ? 'true' : 'false'}">
                          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="2" y="4" width="20" height="16" rx="2"/>
                            <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
                          </svg>
                          Email Ticket
                        </button>
                        <div class="email-input-row" id="email-input-${i}" style="display:none;">
                          <input type="email" class="email-ticket-input" id="email-field-${i}" placeholder="Email address">
                          <button class="btn-send-ticket" id="send-btn-${i}" disabled>Send Ticket</button>
                        </div>
                        <div class="email-ticket-status" id="email-status-${i}"></div>
                      </div>
                    </div>
                  `).join('')}
                </div>
              </div>
            ` : ''}

            ${isCompleted && attendees && attendees.length > 0 ? `
              <div class="detail-section">
                <h3>Your Tickets</h3>
                <p style="font-size:0.9rem;color:#6b7280;margin-bottom:14px;">Download your PDF tickets with QR codes for entry at the door.</p>
                <button class="btn btn-primary" id="download-pdf" style="width:100%;">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:8px;">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="7 10 12 15 17 10"/>
                    <line x1="12" y1="15" x2="12" y2="3"/>
                  </svg>
                  Download PDF Tickets
                </button>
              </div>
            ` : ''}

            <div class="detail-section">
              <h3>Add to Calendar</h3>
              <div class="calendar-buttons">
                <a href="${googleCalendarUrl(event)}" target="_blank" class="btn btn-outline cal-action-btn">Google Calendar</a>
                <button class="btn btn-outline cal-action-btn" id="ics-download">Apple Calendar</button>
                <a href="${outlookCalendarUrl(event)}" target="_blank" class="btn btn-outline cal-action-btn">Outlook</a>
              </div>
            </div>
          </div>

          <div class="confirmation-footer">
            <p>A confirmation email has been sent to <strong>${order.buyer_email}</strong>.</p>
            <div class="confirmation-actions">
              <a href="/event.html?slug=${event.slug}" class="btn btn-outline">View Event</a>
              <a href="/events.html" class="btn btn-primary">Browse More Events</a>
            </div>
          </div>
        </div>
      `;

      // ICS download handler
      const icsBtn = document.getElementById('ics-download');
      if (icsBtn) {
        icsBtn.addEventListener('click', () => downloadICS(event));
      }

      // PDF download handler
      const pdfBtn = document.getElementById('download-pdf');
      if (pdfBtn) {
        pdfBtn.addEventListener('click', () => {
          pdfBtn.disabled = true;
          pdfBtn.textContent = 'Generating...';
          try {
            generateTicketPDF(event, order, attendees);
          } catch (e) {
            console.error('PDF generation failed:', e);
            alert('Failed to generate PDF. Please try again.');
          }
          pdfBtn.disabled = false;
          pdfBtn.innerHTML = `
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:8px;">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            Download PDF Tickets`;
        });
      }

      // Email Ticket button handlers
      async function sendTicketEmail(index, email) {
        const statusEl = document.getElementById(`email-status-${index}`);
        const a = attendees[index];

        statusEl.textContent = 'Generating ticket...';
        statusEl.className = 'email-ticket-status sending';

        try {
          const pdfBase64 = generateSingleTicketBase64(event, order, a, index, attendees.length);

          statusEl.textContent = 'Sending email...';

          const res = await fetch(`${SUPABASE_URL}/functions/v1/send-attendee-ticket`, {
            method: 'POST',
            headers: {
              'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({
              pdf_base64: pdfBase64,
              recipient_email: email,
              attendee_name: a.full_name,
              event_title: event.title,
              order_number: order.order_number,
            }),
          });

          const result = await res.json();

          if (!res.ok) throw new Error(result.error || 'Failed to send');

          statusEl.textContent = `Sent to ${email}`;
          statusEl.className = 'email-ticket-status success';

          // Hide the email input row if it was shown
          const inputRow = document.getElementById(`email-input-${index}`);
          if (inputRow) inputRow.style.display = 'none';
        } catch (err) {
          statusEl.textContent = err.message || 'Failed to send. Try again.';
          statusEl.className = 'email-ticket-status error';
        }
      }

      document.querySelectorAll('.btn-email-ticket').forEach(btn => {
        btn.addEventListener('click', async () => {
          const index = parseInt(btn.dataset.index);
          const hasEmail = btn.dataset.hasEmail === 'true';
          const a = attendees[index];

          if (hasEmail && a.email) {
            // Has email - send directly
            btn.disabled = true;
            btn.textContent = 'Sending...';
            await sendTicketEmail(index, a.email);
            btn.textContent = 'Email Ticket';
            btn.disabled = false;
          } else {
            // No email - show input field
            const inputRow = document.getElementById(`email-input-${index}`);
            inputRow.style.display = inputRow.style.display === 'none' ? 'flex' : 'none';
          }
        });
      });

      // Email input validation + send handlers
      document.querySelectorAll('.email-ticket-input').forEach(input => {
        const index = input.id.replace('email-field-', '');
        const sendBtn = document.getElementById(`send-btn-${index}`);

        input.addEventListener('input', () => {
          const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
          sendBtn.disabled = !emailRegex.test(input.value.trim());
        });

        sendBtn.addEventListener('click', async () => {
          const email = input.value.trim();
          sendBtn.disabled = true;
          sendBtn.textContent = 'Sending...';
          await sendTicketEmail(parseInt(index), email);
          sendBtn.textContent = 'Send Ticket';
          sendBtn.disabled = false;
        });
      });
    }

    loadConfirmation();
  </script>
</body>
</html>
