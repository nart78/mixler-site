<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-JHJEMRXRR1"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-JHJEMRXRR1');
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In | Mixler</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div id="site-nav"></div>

  <section class="auth-section">
    <div class="container">
      <div class="auth-card">
        <div class="auth-tabs">
          <button class="auth-tab active" data-tab="login">Log In</button>
          <button class="auth-tab" data-tab="signup">Sign Up</button>
        </div>

        <!-- Social Login -->
        <div class="social-login">
          <button class="btn-social btn-google" id="btn-google">
            <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
            Continue with Google
          </button>
        </div>

        <div class="auth-divider"><span>or</span></div>

        <!-- Login Form -->
        <form id="login-form" class="auth-form">
          <div class="form-group">
            <label for="login-email">Email</label>
            <input type="email" id="login-email" required placeholder="you@example.com">
          </div>
          <div class="form-group">
            <label for="login-password">Password</label>
            <input type="password" id="login-password" required placeholder="Your password">
          </div>
          <div id="login-error" class="form-error"></div>
          <button type="submit" class="btn btn-primary" style="width:100%;">Log In</button>
        </form>

        <!-- Signup Form -->
        <form id="signup-form" class="auth-form" style="display:none;">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
            <div class="form-group">
              <label for="signup-first">First Name</label>
              <input type="text" id="signup-first" required placeholder="Jane">
            </div>
            <div class="form-group">
              <label for="signup-last">Last Name</label>
              <input type="text" id="signup-last" required placeholder="Smith">
            </div>
          </div>
          <div class="form-group">
            <label for="signup-email">Email</label>
            <input type="email" id="signup-email" required placeholder="you@example.com">
          </div>
          <div class="form-group">
            <label for="signup-password">Password</label>
            <input type="password" id="signup-password" required minlength="6" placeholder="Min 6 characters">
          </div>
          <div id="signup-error" class="form-error"></div>
          <div id="signup-success" class="form-success"></div>
          <button type="submit" class="btn btn-primary" style="width:100%;">Create Account</button>
        </form>
      </div>
    </div>
  </section>

  <div id="site-footer"></div>

  <script type="module">
    import { renderNav, renderFooter, showToast } from './js/components.js';
    import { signIn, signUp, signInWithProvider, getSession } from './js/auth.js';
    import { getParam } from './js/utils.js';

    renderNav('login');
    renderFooter();

    // Redirect if already logged in
    const session = await getSession();
    if (session) {
      const returnUrl = getParam('return') || '/account.html';
      window.location.href = returnUrl;
    }

    // Tab switching
    const tabs = document.querySelectorAll('.auth-tab');
    const loginForm = document.getElementById('login-form');
    const signupForm = document.getElementById('signup-form');

    function switchTab(tab) {
      tabs.forEach(t => t.classList.remove('active'));
      document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
      loginForm.style.display = tab === 'login' ? '' : 'none';
      signupForm.style.display = tab === 'signup' ? '' : 'none';
    }

    tabs.forEach(tab => {
      tab.addEventListener('click', () => switchTab(tab.dataset.tab));
    });

    // Auto-switch if ?tab=signup
    if (getParam('tab') === 'signup') {
      switchTab('signup');
    }

    // Social login handlers
    document.getElementById('btn-google').addEventListener('click', async () => {
      try {
        await signInWithProvider('google');
      } catch (err) {
        document.getElementById('login-error').textContent = err.message;
      }
    });

    // Login handler
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;
      const errorEl = document.getElementById('login-error');
      errorEl.textContent = '';

      try {
        await signIn(email, password);
        const returnUrl = getParam('return') || '/account.html';
        window.location.href = returnUrl;
      } catch (err) {
        errorEl.textContent = err.message === 'Invalid login credentials'
          ? 'Wrong email or password. Please try again.'
          : err.message;
      }
    });

    // Signup handler
    signupForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = (document.getElementById('signup-first').value.trim() + ' ' + document.getElementById('signup-last').value.trim()).trim();
      const email = document.getElementById('signup-email').value;
      const password = document.getElementById('signup-password').value;
      const errorEl = document.getElementById('signup-error');
      const successEl = document.getElementById('signup-success');
      errorEl.textContent = '';
      successEl.textContent = '';

      try {
        const data = await signUp(email, password, name);
        if (data.user && !data.session) {
          successEl.textContent = 'Check your email to confirm your account, then log in.';
        } else {
          const returnUrl = getParam('return') || '/account.html';
          window.location.href = returnUrl;
        }
      } catch (err) {
        errorEl.textContent = err.message;
      }
    });
  </script>
</body>
</html>
